{% extends "base.html" %}

{% block conteudo %}
<div class="banner-header" style="background: linear-gradient(135deg, var(--alerta), #FFC107); color: var(--texto-escuro);">
    <h1>Editar Produto</h1>
    <p>Atualizando informações do sistema</p>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 15px; color: var(--azul-bic);">✏️ SKU: {{ sku }}</h2>

    <form action="/editar_produto/{{ sku }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        
        <div>
            <label style="font-size: 0.85rem; color: var(--texto-claro);">Nome do Produto:</label>
            <input type="text" name="nome" value="{{ produto.nome }}" required class="input-leitor" style="width: 100%;">
        </div>
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 0.85rem; color: var(--texto-claro);">Preço Varejo (R$):</label>
                <input type="number" step="0.01" name="varejo" value="{{ produto.preco_varejo }}" required class="input-leitor" style="width: 100%;">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.85rem; color: var(--texto-claro);">Preço Atacado (R$):</label>
                <input type="number" step="0.01" name="atacado" value="{{ produto.preco_atacado }}" required class="input-leitor" style="width: 100%;">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 0.85rem; color: var(--texto-claro);">Quantidade Total:</label>
                <input type="number" name="qtd" value="{{ produto.quantidade }}" required class="input-leitor" style="width: 100%;">
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <a href="/admin" class="btn-confirmar" style="background-color: var(--texto-claro); text-decoration: none; text-align: center; flex: 1;">Cancelar</a>
            <button type="submit" class="btn-confirmar" style="background-color: var(--sucesso); flex: 2;">💾 Salvar Alterações</button>
        </div>
    </form>
</div>
{% endblock %}
